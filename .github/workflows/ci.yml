name: ci
on: [push, pull_request]

jobs:
  check:
    runs-on: ubuntu-latest   # Linux: macos extras skipped by env markers
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.13"
      - name: Sync (dev only; macos extras skipped on Linux)
        run: uv sync
      - name: Lint
        run: uv run ruff check .
      - name: Types
        run: uv run mypy
      - name: Import boundaries
        run: uv run lint-imports
      - name: Tests
        run: uv run pytest
      - name: Verify manifest
        run: uv run atlas doctor --verify-manifest
