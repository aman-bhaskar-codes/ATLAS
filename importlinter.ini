[importlinter]
root_package = atlas

[importlinter:contract:layers]
name = ATLAS layering (top may import lower; never the reverse)
type = layers
layers =
    atlas.interfaces
    atlas.diagnostics
    atlas.orchestration
    atlas.safety
    atlas.tools
    atlas.perception
    atlas.control
    atlas.infra
ignore_imports =
    atlas.tools.filesystem -> atlas.safety.sandbox
    atlas.tools.shell -> atlas.safety.sandbox
    atlas.diagnostics.doctor -> atlas.app

[importlinter:contract:infra-knows-no-policy]
name = infra must not import safety/tools/interfaces/diagnostics
type = forbidden
source_modules = atlas.infra
forbidden_modules =
    atlas.safety
    atlas.tools
    atlas.interfaces
    atlas.diagnostics

[importlinter:contract:provider-sdk-containment]
name = provider adapters are isolated
type = forbidden
source_modules =
    atlas.safety
    atlas.tools
forbidden_modules = atlas.infra.providers
